mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 8.8.8.8
    - 1.1.1.1
  nameserver:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query

proxies:
  - name: "ProxyMama - 01"
    type: http
    server: 103.115.242.200
    port: 2610

  - name: "ProxyMama - 02"
    type: http
    server: 103.167.17.212
    port: 2610

  - name: "ProxyMama - 03"
    type: http
    server: 114.130.99.200
    port: 2610

proxy-groups:
  - name: "🚀 Proxy"
    type: select
    proxies:
      - "⚡ Auto"
      - "⚖️ LoadBalance"
      - "ProxyMama - 01"
      - "ProxyMama - 02"
      - "ProxyMama - 03"
      - DIRECT

  - name: "⚡ Auto"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - "ProxyMama - 01"
      - "ProxyMama - 02"
      - "ProxyMama - 03"

  - name: "⚖️ LoadBalance"
    type: load-balance
    strategy: round-robin
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - "ProxyMama - 01"
      - "ProxyMama - 02"
      - "ProxyMama - 03"

rules:
  - DOMAIN-SUFFIX,local,DIRECT
  - DOMAIN-SUFFIX,lan,DIRECT

  - GEOIP,BD,DIRECT

  - MATCH,🚀 Proxy
